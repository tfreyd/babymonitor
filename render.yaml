services:
  - type: web
    name: babymonitor
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: ALLOWED_ORIGIN
        value: "*"
      - key: VAPID_SUBJECT
        value: mailto:admin@example.com
